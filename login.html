<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: linear-gradient(135deg, #007BFF, #ffffff);
    }

    /* 3D animated background effect */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 30% 30%, rgba(0,123,255,0.4), transparent),
                    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.6), transparent);
        animation: moveBg 10s infinite alternate;
        z-index: 0;
    }

    @keyframes moveBg {
        0% { transform: translate(0,0); }
        100% { transform: translate(-50px, -50px); }
    }

    .container {
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 15px;
        width: 300px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        text-align: center;
    }

    .container h2 {
        margin-bottom: 20px;
        color: #003366;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        outline: none;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #007BFF;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0056b3;
    }

    .error {
        color: red;
        font-size: 13px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Register</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="phone" placeholder="Enter Phone Number">
    <input type="email" id="email" placeholder="Enter Email ID">

    <div class="error" id="errorMsg"></div>

    <button onclick="submitForm()">Submit</button>
</div>

<script>
function submitForm() {
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let errorMsg = document.getElementById("errorMsg");

    // Basic validation
    if (name === "" || phone === "" || email === "") {
        errorMsg.innerText = "All fields are required!";
        return;
    }

    if (!/^[0-9]{10}$/.test(phone)) {
        errorMsg.innerText = "Enter a valid 10-digit phone number!";
        return;
    }

    if (!/\S+@\S+\.\S+/.test(email)) {
        errorMsg.innerText = "Enter a valid email!";
        return;
    }

    errorMsg.innerText = "";

    // Redirect to another page (you will set filename)
    window.location.href = "tube.html";
}
</script>

</body>
</html>
